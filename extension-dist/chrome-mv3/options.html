<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otto Settings</title>
    <style>
      :root {
        --panel-bg: #fffdf7;
        --panel-border: #e7dcc4;
        --ink: #1f2937;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Avenir Next', 'Futura', 'Trebuchet MS', sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 5%, #fbe8bf 0%, transparent 40%),
          radial-gradient(circle at 90% 90%, #f4c8ba 0%, transparent 35%),
          linear-gradient(140deg, #f4f2ec, #f7f4e8 65%, #efe7dc);
      }

      main {
        max-width: 760px;
        margin: 24px auto;
        padding: 20px;
      }

      .panel {
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        padding: 18px;
        background: var(--panel-bg);
        box-shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 16px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
      }

      .toggle-row label {
        margin: 0;
        font-weight: 600;
      }

      .toggle-row input[type='checkbox'] {
        width: auto;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        border-radius: 10px;
        border: 1px solid #c9bca0;
        padding: 10px 12px;
        font-size: 14px;
        background: #fff;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 8px 14px;
        cursor: pointer;
        font-weight: 700;
        transition: transform 130ms ease, filter 130ms ease, box-shadow 160ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        filter: brightness(1.06);
      }

      button:active {
        transform: translateY(0);
      }

      button:disabled {
        cursor: not-allowed;
        filter: grayscale(0.2) brightness(0.9);
      }

      #connectRelay {
        background: #1d4ed8;
        color: #fff;
      }

      #connectRelay.is-loading {
        background: #0f766e;
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.2);
      }

      .status-card {
        margin-top: 16px;
        border: 1px solid #e2d6bb;
        border-radius: 12px;
        padding: 14px;
        background: #fffcf4;
      }

      #stateChip {
        display: inline-block;
        min-width: 56px;
        text-align: center;
        color: #fff;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 0.06em;
        padding: 4px 10px;
        font-weight: 700;
      }

      #stateTitle {
        margin-top: 8px;
        font-size: 18px;
        font-weight: 700;
        color: #111827;
      }

      #stateDetail,
      #pairingCode,
      #nodeId {
        margin-top: 6px;
        font-size: 14px;
      }

      #pairingCommand {
        margin-top: 8px;
        padding: 9px 11px;
        background: #0f172a;
        color: #f8fafc;
        border-radius: 9px;
        font-size: 14px;
        display: none;
        overflow-x: auto;
      }

      #pairingCommandToast {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 1000;
        max-width: calc(100vw - 40px);
        padding: 9px 12px;
        border-radius: 999px;
        background: #0f5132;
        color: #ecfdf3;
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.24);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.01em;
        pointer-events: none;
        opacity: 0;
        transform: translateY(10px) scale(0.97);
        transition: opacity 170ms ease, transform 200ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      #pairingCommandToast[data-variant='error'] {
        background: #b42318;
        color: #fff1f0;
      }

      #pairingCommandToast.is-visible {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      #relaySaveStatus {
        margin-top: 10px;
        font-size: 13px;
        color: #334155;
      }

      .acl-card {
        margin-top: 16px;
        border: 1px solid #e2d6bb;
        border-radius: 12px;
        padding: 14px;
        background: #fffcf4;
      }

      .acl-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .acl-head h2 {
        margin: 0;
        font-size: 18px;
      }

      #aclRefresh {
        background: #0f766e;
        color: #fff;
      }

      #aclStatus {
        margin-top: 8px;
        font-size: 13px;
        color: #334155;
      }

      .acl-list {
        margin-top: 10px;
        display: grid;
        gap: 8px;
      }

      .acl-row {
        border: 1px solid #e7dcc4;
        border-radius: 10px;
        padding: 10px;
        background: #fffdf7;
      }

      .acl-left {
        display: flex;
        gap: 10px;
        align-items: center;
        min-width: 0;
      }

      .acl-avatar {
        width: 30px;
        height: 30px;
        border-radius: 9999px;
        color: #ffffff;
        font-size: 11px;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
      }

      .acl-text {
        min-width: 0;
      }

      .acl-row-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;

      .acl-description {
        margin-top: 2px;
        font-size: 11px;
        color: #475467;
      }
      }

      .acl-label {
        font-size: 14px;
        font-weight: 700;
      }

      .acl-meta {
        margin-top: 5px;
        font-size: 12px;
        color: #475569;
      }

      .acl-action {
        border: 0;
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 700;
        color: #fff;
      }

      .acl-action.grant {
        background: #0f766e;
      }

      .acl-action.revoke {
        background: #b42318;
      }

      @media (max-width: 640px) {
        main {
          margin: 12px;
          padding: 0;
        }
      }
    </style>
    <script type="module" crossorigin src="/chunks/options-DPrpG0hI.js"></script>
    <link rel="modulepreload" crossorigin href="/chunks/relay-url-BWljrRYU.js">
    <link rel="modulepreload" crossorigin href="/chunks/ui-C2kS4XBk.js">
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>Otto Node Setup</h1>
        <p>Set relay URL, watch pairing state, and confirm live connection.</p>
        <label for="relayUrl">Relay URL</label>
        <input id="relayUrl" placeholder="ws://127.0.0.1:8787">
        <div id="localDevLogRow" class="toggle-row">
          <input id="localDevLogStreamingEnabled" type="checkbox">
          <label for="localDevLogStreamingEnabled">Send extension debug logs to relay (local dev)</label>
        </div>
        <div class="actions">
          <button id="connectRelay" type="button">Connect</button>
        </div>
        <div id="relaySaveStatus"></div>
        <div class="status-card">
          <span id="stateChip">SET</span>
          <div id="stateTitle">Loading status…</div>
          <div id="stateDetail"></div>
          <div id="pairingCode"></div>
          <div id="pairingCommandToast" aria-live="polite" aria-hidden="true"></div>
          <pre id="pairingCommand"></pre>
          <div id="nodeId"></div>
        </div>
        <section class="acl-card" id="aclCard" style="display: none;">
          <div class="acl-head">
            <h2>Controller Access</h2>
            <button id="aclRefresh" type="button">Refresh</button>
          </div>
          <div id="aclStatus">Waiting for node authentication...</div>
          <div class="acl-list" id="aclList"></div>
        </section>
      </section>
    </main>
  </body>
</html>
