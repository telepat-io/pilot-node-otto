<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Otto Node</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=Montserrat+Alternates:wght@500&display=swap">

<style>
  :root {
    --tp-bg:             #14102B;
    --tp-bg-deep:        #0C0820;
    --tp-surface:        #221949;
    --tp-surface-hover:  #2B1F5C;
    --tp-surface-glass:  rgba(34,25,73,0.55);

    --tp-fg:             #FFFFFF;
    --tp-fg-dim:         rgba(255,255,255,0.88);
    --tp-fg-muted:       rgba(255,255,255,0.56);
    --tp-fg-quiet:       rgba(255,255,255,0.38);
    --tp-fg-invert:      #000000;

    --otto-mint:         oklch(55% 0.16 165);
    --otto-mint-hover:   oklch(48% 0.16 165);
    --otto-mint-ring:    oklch(55% 0.16 165 / 0.35);
    --otto-cyan:         oklch(62% 0.13 200);
    --otto-cyan-dim:     oklch(62% 0.13 200 / 0.35);

    --tp-line:           rgba(255,255,255,0.08);
    --tp-line-strong:    rgba(255,255,255,0.16);
    --tp-line-hover:     rgba(255,255,255,0.22);

    --glow-blue:         rgba(79,75,255,0.06);
    --glow-mint:         rgba(45,200,140,0.04);
    --glow-cyan:         rgba(0,210,230,0.05);

    --tp-success:        #06AC38;
    --tp-success-glow:   rgba(6,172,56,0.25);
    --tp-danger:         #FF5C8D;
    --tp-danger-glow:    rgba(255,92,141,0.22);
    --tp-warn:           #F0A040;
    --tp-warn-glow:      rgba(240,160,64,0.22);
    --tp-info:           #8EA7FF;
    --tp-info-glow:      rgba(142,167,255,0.22);

    --radius-sm:         8px;
    --radius:            12px;
    --radius-card:       14px;
    --radius-pill:       500px;

    --space-xs:          4px;
    --space-sm:          8px;
    --space-md:          12px;
    --space-lg:          16px;
    --space-xl:          20px;

    --font-body:         'Poppins', system-ui, -apple-system, sans-serif;
    --font-mark:         'Montserrat Alternates', 'Montserrat', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 380px;
    font-family: var(--font-body);
    font-weight: 300;
    font-size: 13px;
    line-height: 1.5;
    color: var(--tp-fg-dim);
    background: var(--tp-bg);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    position: relative;
    isolation: isolate;
  }

  body::before,
  body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    z-index: 0;
    pointer-events: none;
    filter: blur(80px);
  }
  body::before {
    width: 520px; height: 520px;
    right: -220px; top: -240px;
    background: var(--glow-blue);
  }
  body::after {
    width: 360px; height: 360px;
    left: -120px; bottom: -140px;
    background: var(--glow-mint);
  }

  body > * {
    position: relative;
    z-index: 1;
  }

  /* Header */
  .tp-header {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    padding: var(--space-lg) var(--space-xl);
    background: rgba(12,8,32,0.78);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--tp-line);
  }

  .tp-logo-wrap {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: oklch(90% 0.04 170);
    box-shadow: 0 0 18px var(--otto-mint-ring);
  }

  .tp-logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .tp-header-text { flex: 1; min-width: 0; }
  .tp-header-text h1 {
    font-family: var(--font-mark);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.080em;
    text-transform: uppercase;
    color: var(--tp-fg);
    line-height: 1.2;
  }
  .tp-header-text p {
    font-family: var(--font-body);
    font-weight: 300;
    font-size: 11px;
    color: var(--tp-fg-muted);
    line-height: 1.2;
    letter-spacing: 0.02em;
  }

  /* Sections */
  .tp-section {
    padding: var(--space-lg) var(--space-xl);
  }

  .tp-section + .tp-section {
    border-top: 1px solid var(--tp-line);
  }

  .tp-section[hidden] { display: none; }

  .tp-section-label {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: oklch(55% 0.16 165 / 0.78);
    margin-bottom: var(--space-md);
    display: flex;
    align-items: center;
    gap: var(--space-sm);
  }

  .tp-section-label::before {
    content: '';
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--otto-mint);
    box-shadow: 0 0 8px var(--otto-mint-ring);
    flex-shrink: 0;
  }

  /* Relay config */
  .relay-row {
    display: flex;
    gap: var(--space-sm);
  }

  .relay-row input[type="text"] {
    flex: 1;
    min-width: 0;
    font-family: var(--font-body);
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 0.01em;
    padding: 9px var(--space-md);
    border: 1px solid var(--tp-line-strong);
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.04);
    color: var(--tp-fg-dim);
    outline: none;
    transition: border-color 150ms ease, box-shadow 150ms ease;
  }

  .relay-row input[type="text"]:focus {
    border-color: var(--otto-mint);
    box-shadow: 0 0 0 3px var(--otto-mint-ring);
  }

  .relay-row input[type="text"]::placeholder {
    color: var(--tp-fg-quiet);
  }

  #connectRelay {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 0.03em;
    padding: 9px var(--space-lg);
    border: none;
    border-radius: var(--radius-sm);
    background: var(--otto-mint);
    color: #000;
    cursor: pointer;
    white-space: nowrap;
    transition: background 150ms ease, box-shadow 150ms ease, opacity 150ms ease;
    flex-shrink: 0;
    box-shadow: 0 0 22px var(--otto-mint-ring);
  }

  #connectRelay:hover:not(:disabled) {
    background: var(--otto-mint-hover);
    box-shadow: 0 0 30px var(--otto-mint-ring);
  }

  #connectRelay:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    box-shadow: none;
  }

  #connectRelay.is-loading {
    background: var(--tp-surface);
    color: var(--tp-fg-muted);
    box-shadow: none;
  }

  #connectRelay.is-disconnect {
    background: rgba(255,255,255,0.06);
    color: var(--tp-fg-dim);
    border: 1px solid var(--tp-line-strong);
    box-shadow: none;
  }

  #connectRelay.is-disconnect:hover {
    background: rgba(255,92,141,0.12);
    border-color: var(--tp-danger);
    color: var(--tp-danger);
  }

  .local-dev-row {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    margin-top: var(--space-md);
    font-size: 12px;
    font-weight: 300;
    color: var(--tp-fg-muted);
  }

  .local-dev-row input[type="checkbox"] {
    appearance: none;
    width: 14px;
    height: 14px;
    border: 1px solid var(--tp-line-strong);
    border-radius: 3px;
    background: rgba(255,255,255,0.04);
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
  }

  .local-dev-row input[type="checkbox"]:checked {
    background: var(--otto-mint);
    border-color: var(--otto-mint);
    box-shadow: 0 0 10px var(--otto-mint-ring);
  }

  .local-dev-row input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 3px; top: 1px;
    width: 6px; height: 8px;
    border: solid #000;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  #relaySaveStatus {
    margin-top: var(--space-sm);
    font-size: 11px;
    font-weight: 300;
    color: var(--tp-fg-muted);
    min-height: 16px;
  }

  /* Status */
  .status-head {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    margin-bottom: var(--space-sm);
  }

  #stateChip {
    display: inline-block;
    font-family: var(--font-body);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: var(--radius-pill);
    border: 1px solid transparent;
    transition: all 200ms ease;
  }

  #stateChip[data-chip="idle"] {
    color: var(--tp-fg-muted);
    background: rgba(255,255,255,0.05);
    border-color: var(--tp-line-strong);
  }
  #stateChip[data-chip="connecting"] {
    color: var(--tp-info);
    background: rgba(142,167,255,0.08);
    border-color: rgba(142,167,255,0.25);
    box-shadow: 0 0 12px var(--tp-info-glow);
  }
  #stateChip[data-chip="pairing"] {
    color: var(--tp-warn);
    background: rgba(240,160,64,0.08);
    border-color: rgba(240,160,64,0.25);
    box-shadow: 0 0 12px var(--tp-warn-glow);
  }
  #stateChip[data-chip="connected"] {
    color: var(--tp-success);
    background: rgba(6,172,56,0.08);
    border-color: rgba(6,172,56,0.25);
    box-shadow: 0 0 12px var(--tp-success-glow);
  }
  #stateChip[data-chip="error"] {
    color: var(--tp-danger);
    background: rgba(255,92,141,0.08);
    border-color: rgba(255,92,141,0.25);
    box-shadow: 0 0 12px var(--tp-danger-glow);
  }
  #stateChip[data-chip="mismatch"] {
    color: var(--tp-warn);
    background: rgba(240,160,64,0.08);
    border-color: rgba(240,160,64,0.25);
    box-shadow: 0 0 12px var(--tp-warn-glow);
  }

  #stateTitle {
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 500;
    color: var(--tp-fg);
    letter-spacing: -0.01em;
  }

  #stateDetail {
    font-family: var(--font-body);
    font-weight: 300;
    font-size: 12px;
    color: var(--tp-fg-muted);
    margin-bottom: var(--space-sm);
  }

  #nodeId {
    font-family: var(--font-body);
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.02em;
    color: var(--tp-fg-muted);
    background: rgba(255,255,255,0.04);
    padding: var(--space-xs) var(--space-md);
    border-radius: var(--radius-sm);
    border: 1px solid var(--tp-line);
    display: inline-block;
    word-break: break-all;
    max-width: 100%;
  }

  .status-extra {
    font-size: 11px;
    font-weight: 300;
    color: var(--tp-fg-muted);
    margin-top: var(--space-sm);
  }

  /* Pairing */
  .tp-section--pairing {
    background: rgba(45,200,140,0.04);
    border-top: 1px solid rgba(45,200,140,0.12);
  }

  .pairing-code-display {
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 18px;
    letter-spacing: 0.14em;
    text-align: center;
    padding: var(--space-md);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--otto-mint);
    border-radius: var(--radius);
    color: var(--tp-fg);
    margin-bottom: var(--space-md);
    user-select: all;
    box-shadow: 0 0 20px var(--otto-mint-ring);
  }

  .pairing-waiting {
    font-family: var(--font-body);
    font-weight: 300;
    font-size: 13px;
    color: var(--tp-fg-muted);
    text-align: center;
    padding: var(--space-md);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--tp-line);
    border-radius: var(--radius);
  }

  .pairing-waiting .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid var(--tp-line);
    border-top-color: var(--otto-mint);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: var(--space-sm);
    vertical-align: middle;
    box-shadow: 0 0 10px var(--otto-mint-ring);
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #pairingCommand {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 0.02em;
    padding: var(--space-sm) var(--space-md);
    background: rgba(0,0,0,0.35);
    color: var(--otto-cyan);
    border-radius: var(--radius-sm);
    border: 1px solid rgba(0,210,230,0.18);
    cursor: pointer;
    user-select: all;
    word-break: break-all;
    transition: background 150ms ease, border-color 150ms ease;
    white-space: pre-wrap;
    margin: 0;
  }

  #pairingCommand:hover {
    background: rgba(0,0,0,0.55);
    border-color: rgba(0,210,230,0.35);
  }

  #pairingCommandToast {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 400;
    text-align: center;
    padding: var(--space-xs) var(--space-sm);
    border-radius: var(--radius-sm);
    margin-top: var(--space-sm);
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 150ms ease, transform 150ms ease;
    pointer-events: none;
  }

  #pairingCommandToast.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  #pairingCommandToast[data-variant="success"] {
    background: rgba(6,172,56,0.10);
    color: var(--tp-success);
  }

  #pairingCommandToast[data-variant="error"] {
    background: rgba(255,92,141,0.10);
    color: var(--tp-danger);
  }

  /* ACL */
  .acl-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--space-sm);
    margin-bottom: var(--space-md);
  }

  #aclStatus {
    font-size: 11px;
    font-weight: 300;
    color: var(--tp-fg-muted);
    flex: 1;
    min-width: 0;
  }

  #aclRefresh {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 4px var(--space-md);
    border: 1px solid var(--tp-line-strong);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--tp-fg-muted);
    cursor: pointer;
    transition: border-color 150ms ease, color 150ms ease;
    flex-shrink: 0;
  }

  #aclRefresh:hover {
    border-color: var(--otto-mint);
    color: var(--otto-mint);
  }

  #aclList {
    display: flex;
    flex-direction: column;
    gap: var(--space-sm);
  }

  .acl-meta {
    font-size: 11px;
    font-weight: 300;
    color: var(--tp-fg-quiet);
    padding: var(--space-md) 0;
    text-align: center;
  }

  .acl-row {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--tp-line);
    border-radius: var(--radius-card);
    padding: var(--space-md);
    transition: border-color 150ms ease;
  }

  .acl-row:hover {
    border-color: var(--tp-line-strong);
  }

  .acl-row-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--space-sm);
  }

  .acl-left {
    display: flex;
    align-items: flex-start;
    gap: var(--space-sm);
    flex: 1;
    min-width: 0;
  }

  .acl-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 500;
    color: var(--tp-fg);
  }

  .acl-text {
    min-width: 0;
  }

  .acl-label {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    color: var(--tp-fg);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .acl-description {
    font-size: 11px;
    font-weight: 300;
    color: var(--tp-fg-muted);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .acl-action {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.03em;
    padding: 5px 12px;
    border: 1px solid var(--tp-line-strong);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--tp-fg-muted);
    cursor: pointer;
    flex-shrink: 0;
    transition: all 150ms ease;
  }

  .acl-action:hover:not(:disabled) {
    border-color: var(--otto-mint);
    color: var(--otto-mint);
  }

  .acl-action.grant:hover:not(:disabled) {
    border-color: var(--tp-success);
    color: var(--tp-success);
  }

  .acl-action.revoke:hover:not(:disabled) {
    border-color: var(--tp-danger);
    color: var(--tp-danger);
  }

  .acl-action:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .acl-row > .acl-meta {
    margin-top: var(--space-sm);
    padding: 0;
    font-size: 11px;
    font-weight: 300;
    text-align: left;
  }

  /* Footer */
  .tp-footer {
    padding: var(--space-sm) var(--space-xl);
    border-top: 1px solid var(--tp-line);
    font-size: 10px;
    font-weight: 300;
    color: var(--tp-fg-quiet);
    text-align: center;
    letter-spacing: 0.04em;
  }
</style>
  <script type="module" crossorigin src="/chunks/popup-BpZQX4zc.js"></script>
  <link rel="modulepreload" crossorigin href="/chunks/relay-url-BWljrRYU.js">
  <link rel="modulepreload" crossorigin href="/chunks/ui-C2kS4XBk.js">
</head>
<body>

  <header class="tp-header">
    <div class="tp-logo-wrap">
      <img src="/otto-avatar.webp" alt="Otto" width="34" height="34">
    </div>
    <div class="tp-header-text">
      <h1>OTTO</h1>
      <p>Browser Automator</p>
    </div>
  </header>

  <div class="tp-section" id="relaySection">
    <div class="tp-section-label">Relay</div>
    <div class="relay-row">
      <input type="text" id="relayUrl" placeholder="ws://127.0.0.1:8787" spellcheck="false">
      <button type="button" id="connectRelay">Connect</button>
    </div>
    <div class="local-dev-row" id="localDevLogRow" style="display:none">
      <input type="checkbox" id="localDevLogStreamingEnabled">
      <label for="localDevLogStreamingEnabled" style="cursor:pointer;user-select:none;">Send extension debug logs to relay (local dev)</label>
    </div>
    <div id="relaySaveStatus"></div>
  </div>

  <div class="tp-section" id="statusSection">
    <div class="tp-section-label">Status</div>
    <div class="status-head">
      <span id="stateChip" data-chip="idle">SET</span>
    </div>
    <div id="stateTitle">Loading status...</div>
    <div id="stateDetail"></div>
    <div id="nodeId">Node ID: --</div>
  </div>

  <div class="tp-section tp-section--pairing" id="pairingSection" hidden>
    <div class="tp-section-label">Pairing</div>
    <div id="pairingCode">
      <div class="pairing-waiting"><span class="spinner"></span>Requesting pairing code...</div>
    </div>
    <pre id="pairingCommand" style="display:none"></pre>
    <div id="pairingCommandToast" aria-hidden="true"></div>
  </div>

  <div class="tp-section" id="aclCard" hidden>
    <div class="tp-section-label">Controller Access</div>
    <div class="acl-head">
      <div id="aclStatus">Loading controller access list...</div>
      <button type="button" id="aclRefresh">Refresh</button>
    </div>
    <div id="aclList"></div>
  </div>

  <footer class="tp-footer">
    Otto · Browser Automator
  </footer>


</body>
</html>
